# ==============================================================================
# Manifest: 00-kueue-manager-config.yaml
# Description: 온프레미스 Kueue Controller Manager 설정 (batch/job 프레임워크 한정)
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kueue-manager-config
  namespace: kueue-system
data:
  controller_manager_config.yaml: |
    apiVersion: config.kueue.x-k8s.io/v1beta1
    kind: Configuration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8443
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: c1f6bfd2.kueue.x-k8s.io
    integrations:
      # MultiKueue 헬스체크 시 미설치된 외부 CRD(Kubeflow, Ray 등) 연결 오류 방지를 위해 batch/job 으로 한정
      frameworks:
      - "batch/job"
