apiVersion: apps/v1
kind: Deployment
metadata:
  name: kueue-controller-manager
  namespace: kueue-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - name: manager
        image: registry.k8s.io/kueue/kueue:v0.10.1
        command:
        - /manager
        args:
        - --config=/controller_manager_config.yaml
        - --zap-log-level=2
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8082
          name: visibility
          protocol: TCP
        - containerPort: 8443
          name: metrics
          protocol: TCP
        volumeMounts:
        - mountPath: /controller_manager_config.yaml
          name: manager-config
          subPath: controller_manager_config.yaml
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      serviceAccountName: kueue-controller-manager
      volumes:
      - configMap:
          name: kueue-manager-config
        name: manager-config
      - secret:
          secretName: kueue-webhook-server-cert
        name: cert
